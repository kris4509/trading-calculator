<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2442"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <line x1="8" y1="20" x2="56" y2="20" stroke="#ffffff10" stroke-width="0.5"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#ffffff10" stroke-width="0.5"/>
  <line x1="8" y1="44" x2="56" y2="44" stroke="#ffffff10" stroke-width="0.5"/>

  <!-- Candlestick bars -->
  <rect x="10" y="34" width="5" height="12" rx="1" fill="#ef4444" opacity="0.9"/>
  <line x1="12.5" y1="30" x2="12.5" y2="34" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="12.5" y1="46" x2="12.5" y2="50" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="20" y="26" width="5" height="14" rx="1" fill="#22c55e" opacity="0.9"/>
  <line x1="22.5" y1="21" x2="22.5" y2="26" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="22.5" y1="40" x2="22.5" y2="44" stroke="#22c55e" stroke-width="1.5"/>

  <rect x="30" y="22" width="5" height="16" rx="1" fill="#22c55e" opacity="0.9"/>
  <line x1="32.5" y1="17" x2="32.5" y2="22" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="32.5" y1="38" x2="32.5" y2="42" stroke="#22c55e" stroke-width="1.5"/>

  <rect x="40" y="28" width="5" height="10" rx="1" fill="#ef4444" opacity="0.9"/>
  <line x1="42.5" y1="24" x2="42.5" y2="28" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="42.5" y1="38" x2="42.5" y2="42" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="50" y="16" width="5" height="20" rx="1" fill="#22c55e" opacity="0.9"/>
  <line x1="52.5" y1="12" x2="52.5" y2="16" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="52.5" y1="36" x2="52.5" y2="40" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Trending up line -->
  <polyline points="10,48 22,36 34,28 46,30 56,14"
    fill="none" stroke="url(#chartLine)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.85"/>

  <!-- Dollar coin -->
  <circle cx="52" cy="52" r="8" fill="url(#coinGrad)" opacity="0.95"/>
  <text x="52" y="56.5" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#78350f">$</text>
</svg>